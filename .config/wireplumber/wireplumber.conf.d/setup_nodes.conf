monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3.analog-stereo"
        object.path = "alsa:acp:PCH:6:playback"
      }
    ]
    actions = {
      update-props = {
        node.description = "Laptop's Speakers"
        priority.driver = 999
        priority.session = 999
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3.analog-stereo"
        object.path = "alsa:acp:PCH:0:capture"
      }
    ]
    actions = {
      update-props = {
        node.description = "Laptop's Microphone"
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3.hdmi-stereo"
      }
    ]
    actions = {
      update-props = {
        node.description = "MSI Monitor's Speakers"
        priority.driver = 998
        priority.session = 998
      }
    }
  },
  {
    matches = [
      {
        node.name = "bluez_output.E4_92_82_58_59_D3.1"
      }
    ]
    actions = {
      update-props = {
        node.description = "Andrea's Buds FE"
        priority.driver = 1000
        priority.session = 1000
      }
    }
  }
]